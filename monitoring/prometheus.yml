# prometheus.yml — full monitoring stack
global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: clickhouse
    static_configs:
      - targets: ["clickhouse:8123"]

  - job_name: elasticsearch
    static_configs:
      - targets: ["elasticsearch:9200"]
    metrics_path: /_prometheus/metrics

  - job_name: minio
    static_configs:
      - targets: ["minio:9000"]
    metrics_path: /minio/v2/metrics/cluster
    scheme: http
    basic_auth:
      username: minioadmin
      password: minioadmin

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: airflow
    static_configs:
      - targets: ["airflow-statsd:9102"]
