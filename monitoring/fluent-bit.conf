# Fluent Bit — collect Docker container logs → Elasticsearch → Kibana
# ponytail: tail all container logs, tag by container_name, ship to ES

[SERVICE]
    flush        5
    daemon       off
    log_level    info
    parsers_file /fluent-bit/etc/parsers.conf

[INPUT]
    name         tail
    path         /var/lib/docker/containers/*/*.log
    parser       docker
    tag          docker.*

[FILTER]
    name         record_modifier
    match        docker.*
    record       hostname ${HOSTNAME}

[OUTPUT]
    name         es
    match        docker.*
    host         elasticsearch
    port         9200
    index        fluentbit
    type         _doc
    logstash_format on
    logstash_prefix fluentbit
    retry_limit  false
