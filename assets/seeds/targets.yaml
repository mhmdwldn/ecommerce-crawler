# Seed asset registry — PRD_50
# File ini versioned di git = sumber kebenaran awal daftar target.
# Ubah file ini lalu jalankan:  python -m assets.seed
#
# priority   : 1 = tertinggi, 9 = terendah (dipakai untuk urutan & throttling)
# cadence_min: crawl ulang tiap N menit
# Rule of thumb: makin volatil harganya (flagship baru / hype) → cadence pendek + priority tinggi.
#                aksesori & fashion basic → cadence panjang, hemat request.

defaults:
  platform: tokopedia
  crawl_type: search-product
  max_pages: 2

assets:
  # ============ ELEKTRONIK — HP ============
  - label: POCO F8
    category: elektronik
    keyword: poco f8
    priority: 1
    cadence_min: 60

