name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================================
  # Job 1: Lint semua Python code (crawler + pipeline + assets)
  # ============================================================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install ruff
        run: pip install ruff
      - name: Lint (ruff)
        run: ruff check source/ pipeline/ assets/ dashboards/

  # ============================================================================
  # Job 2: Crawler unit tests (no infra needed, fully mocked)
  # ============================================================================
  test-crawler:
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: source
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Test crawler
        run: PYTHONPATH=. pytest tests/ -v

  # ============================================================================
  # Job 3: Pipeline unit tests (needs PySpark, no live infra)
  # ============================================================================
  test-pipeline:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - name: Install dependencies
        run: pip install pyspark==3.5.4 delta-spark==3.3.0 clickhouse-connect duckdb pytest
      - name: Test pipeline
        env:
          # Skip tests that need live ClickHouse — CI tests only (bronze + silver)
          CLICKHOUSE_HOST: ""
          PYTHONPATH: ${{ github.workspace }}
        run: |
          cd pipeline
          # Run only tests that don't need live ClickHouse
          PYTHONPATH=${{ github.workspace }} pytest tests/test_bronze.py tests/test_silver.py -v

  # ============================================================================
  # Job 4: Assets tests (needs Postgres service container)
  # ============================================================================
  test-assets:
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mart
          POSTGRES_USER: mart
          POSTGRES_PASSWORD: mart
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install psycopg2-binary pytest pyyaml
      - name: Setup DB schema
        run: |
          PGPASSWORD=mart psql -h localhost -U mart -d mart -c "CREATE SCHEMA IF NOT EXISTS control"
          PGPASSWORD=mart psql -h localhost -U mart -d mart -f assets/ddl/crawl_assets.sql
      - name: Test assets
        env:
          CONTROL_DSN: "host=localhost port=5432 dbname=mart user=mart password=mart"
        run: |
          cd assets && PYTHONPATH=. pytest tests/ -v

  # ============================================================================
  # Job 5: dbt compile check (no data, just verify SQL compiles)
  # ============================================================================
  test-dbt:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install dbt-duckdb duckdb
      - name: dbt compile
        run: |
          cd pipeline/dbt
          dbt compile --profiles-dir .
