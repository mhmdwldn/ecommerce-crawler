name: ecommerce-crawler

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [kafka-net]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks: [kafka-net]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks: [kafka-net]

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    depends_on: [elasticsearch]
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks: [kafka-net]

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    networks: [kafka-net]

  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb -p local/lakehouse;
      exit 0"
    networks: [kafka-net]

  postgres:
    image: postgres:16
    container_name: postgres-mart
    environment:
      POSTGRES_DB: mart
      POSTGRES_USER: mart
      POSTGRES_PASSWORD: mart
    ports:
      - "5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks: [kafka-net]

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: ch_user
      CLICKHOUSE_PASSWORD: ch_pass
    ports:
      - "8123:8123"
    volumes:
      - ch-data:/var/lib/clickhouse
      - ../../monitoring/clickhouse-prometheus.xml:/etc/clickhouse-server/config.d/prometheus.xml:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [kafka-net]

  metabase:
    image: metabase/metabase:v0.53.5
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: mart
      MB_DB_PASS: mart
      MB_DB_HOST: postgres
    volumes:
      - mb-data:/metabase-data
    depends_on: [postgres]
    networks: [kafka-net]

  superset:
    image: apache/superset:latest
    container_name: superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: superset-dev-key-change-in-production
      SUPERSET_DB_NAME: superset
      SUPERSET_DB_USER: mart
      SUPERSET_DB_PASS: mart
      SUPERSET_DB_HOST: postgres
      SUPERSET_DB_PORT: 5432
    volumes:
      - sup-data:/app/superset_home
    depends_on: [postgres, clickhouse]
    networks: [kafka-net]

  airflow:
    build:
      context: ../..
      dockerfile: pipeline/airflow/Dockerfile
    container_name: airflow
    command: airflow standalone
    depends_on: [kafka, minio, postgres, clickhouse]
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/repo/pipeline/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC: tokopedia.products.raw
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      DUCKDB_S3_ENDPOINT: minio:9000
      POSTGRES_DSN: host=postgres port=5432 dbname=mart user=mart password=mart
      GOLD_DB_PATH: /opt/airflow/repo/pipeline/dbt/gold.duckdb
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: ch_user
      CLICKHOUSE_PASSWORD: ch_pass
      AIRFLOW__METRICS__STATSD_ON: "true"
      AIRFLOW__METRICS__STATSD_HOST: airflow-statsd
      AIRFLOW__METRICS__STATSD_PORT: "9125"
      AIRFLOW__METRICS__STATSD_PREFIX: airflow
      AIRFLOW__SECRETS__BACKEND: airflow.providers.hashicorp.secrets.vault.VaultBackend
      AIRFLOW__SECRETS__BACKEND_KWARGS: '{"url":"http://vault:8200","token":"root-token-dev","connections_path":"connections","variables_path":"variables"}'
    volumes:
      - ../..:/opt/airflow/repo
      - airflow-data:/opt/airflow
    networks: [kafka-net]

  # ============================================================================
  # Monitoring stack
  # ============================================================================

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    ports:
      - "9090:9090"
    volumes:
      - ../../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    networks: [kafka-net]

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: ""
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on: [prometheus]
    networks: [kafka-net]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ../../monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    networks: [kafka-net]

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://mart:mart@postgres:5432/mart?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on: [postgres]
    networks: [kafka-net]

  # ============================================================================
  # Log aggregation (Fluent Bit → Elasticsearch → Kibana)
  # ============================================================================

  fluentbit:
    image: fluent/fluent-bit:3.1
    container_name: fluentbit
    volumes:
      - ../../monitoring/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on: [elasticsearch]
    networks: [kafka-net]

  # ============================================================================
  # TLS/SSL Reverse Proxy
  # ============================================================================

  caddy:
    image: caddy:2.8
    container_name: caddy
    ports:
      - "8081:80"
    volumes:
      - ../../monitoring/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    networks: [kafka-net]

  # ============================================================================
  # Secret management
  # ============================================================================

  vault:
    image: hashicorp/vault:1.18
    container_name: vault
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root-token-dev
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    networks: [kafka-net]

  # Converts Airflow statsd metrics -> Prometheus
  airflow-statsd:
    image: prom/statsd-exporter:v0.26.1
    container_name: airflow-statsd
    ports:
      - "9102:9102"
      - "9125:9125/udp"
    command:
      - "--statsd.listen-udp=:9125"
      - "--statsd.mapping-config=/etc/statsd-exporter/mapping.yml"
    volumes:
      - ../../monitoring/statsd-mapping.yml:/etc/statsd-exporter/mapping.yml:ro
    networks: [kafka-net]

networks:
  kafka-net:
    driver: bridge

volumes:
  es-data:
  minio-data:
  pg-data:
  ch-data:
  mb-data:
  sup-data:
  prometheus-data:
  grafana-data:
  caddy-data:
  airflow-data:
