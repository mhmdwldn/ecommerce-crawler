services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [kafka-net]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks: [kafka-net]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks: [kafka-net]

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    depends_on: [elasticsearch]
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks: [kafka-net]

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    networks: [kafka-net]

  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb -p local/lakehouse;
      exit 0"
    networks: [kafka-net]

  postgres:
    image: postgres:16
    container_name: postgres-mart
    environment:
      POSTGRES_DB: mart
      POSTGRES_USER: mart
      POSTGRES_PASSWORD: mart
    ports:
      - "5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks: [kafka-net]

  airflow:
    build:
      context: ../..
      dockerfile: pipeline/airflow/Dockerfile
    container_name: airflow
    command: airflow standalone
    depends_on: [kafka, minio, postgres]
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/repo/pipeline/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC: tokopedia.products.raw
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      DUCKDB_S3_ENDPOINT: minio:9000
      POSTGRES_DSN: host=postgres port=5432 dbname=mart user=mart password=mart
      GOLD_DB_PATH: /opt/airflow/repo/pipeline/dbt/gold.duckdb
    volumes:
      - ../..:/opt/airflow/repo
      - airflow-data:/opt/airflow
    networks: [kafka-net]

networks:
  kafka-net:
    driver: bridge

volumes:
  es-data:
  minio-data:
  pg-data:
  airflow-data:
